name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build ardentrack.exe
        run: |
          pyinstaller --onefile --name ardentrack ^
            --hidden-import=win32timezone ^
            --hidden-import=keyring.backends.Windows ^
            --hidden-import=dotenv ^
            --hidden-import=supabase ^
            --hidden-import=postgrest ^
            --hidden-import=gotrue ^
            --hidden-import=storage3 ^
            --hidden-import=realtime ^
            --hidden-import=supafunc ^
            --hidden-import=httpx ^
            --hidden-import=hpack ^
            --hidden-import=h2 ^
            --hidden-import=httpcore ^
            --hidden-import=watchdog.observers ^
            --hidden-import=watchdog.events ^
            ardentrack/main.py
        shell: cmd

      - name: Verify ardentrack.exe
        run: |
          if (!(Test-Path "dist\ardentrack.exe")) { throw "ardentrack.exe not found" }
          Get-Item "dist\ardentrack.exe" | Select-Object Name, Length

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Electron dependencies
        working-directory: ardentrack-electron
        run: npm install

      - name: Build Electron installer
        working-directory: ardentrack-electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always

      - name: List build artifacts
        run: Get-ChildItem -Recurse ardentrack-electron\dist-electron\*.exe, ardentrack-electron\dist-electron\latest.yml -ErrorAction SilentlyContinue
